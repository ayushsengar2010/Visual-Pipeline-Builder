version: '3.9'

services:
  backend:
    build:
      context: ./backend
    container_name: visual-pipeline-backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: visual-pipeline-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - CHOKIDAR_USEPOLLING=true
